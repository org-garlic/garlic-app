<style>
/* ========== FONTS ========== */

/* ========== RESET & VARIABLES ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAFA;
  --bg-alt:#FAFAFA;
  --card:#FFFFFF;
  --text:#3D4A1E;
  --text-light:#A0AD78;
  --green:#98CD00;
  --green-light:#E8F8ED;
  --gold:#FFB8D0;
  --gold-light:#FFF3D6;
  --coral:#FF6B9D;
  --border:#F0E8A0;
  --garlic-green:#98CD00;
  --garlic-green-light:#E8F8ED;
  --garlic-green-pale:rgba(0,199,60,0.08);
  --garlic-bg:#FAFAFA;
  --garlic-white:#FFFFFF;
  --garlic-black:#3D4A1E;
  --garlic-gray:#666666;
  --garlic-gray-light:#A0AD78;
  --garlic-gray-border:#F0E8A0;
  --garlic-coral:#FF6B9D;
  --garlic-gold:#FFB8D0;
  --garlic-red:#FF4848;
  --garlic-purple:#7C4DFF;
  --garlic-blue:#2196F3;
  --font:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
  --header-h:52px;
  --tab-h:44px;
  --nav-h:56px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;scroll-behavior:smooth}
body{max-width:430px;margin-left:auto;margin-right:auto;
  font-family:var(--font);
  background:var(--garlic-bg);
  color:var(--garlic-black);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
  padding-top:calc(var(--header-h) + var(--tab-h) + var(--safe-top));
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px);
}
::-webkit-scrollbar{width:0;height:0}
a{text-decoration:none;color:inherit}
button{border:none;background:none;cursor:pointer;font-family:var(--font)}
img{display:block;max-width:100%}

/* ========== MAIN ========== */
.main{max-width:430px;margin:0 auto;padding:0}

/* ========== HERO DEAL BANNER ========== */
.hero-deal{
  margin:12px 16px;border-radius:16px;overflow:hidden;
  background:url('../reference/garlic_day_bg.png') center / cover;
  padding:24px 20px;position:relative;color:#3D4A1E;min-height:180px;
}
.hero-deal::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(164,221,0,.3) 0%,rgba(182,245,0,.1) 100%);
  pointer-events:none;
}
.hero-deal::after{
  content:'';position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;
  background:radial-gradient(circle,rgba(212,168,67,0.2) 0%,transparent 70%);
  border-radius:50%;
}
.hero-label{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.2);border-radius:20px;
  padding:5px 12px;font-size:0.72rem;font-weight:700;
  margin-bottom:12px;backdrop-filter:blur(4px);
}
.hero-title{font-size:1.6rem;font-weight:700;margin-bottom:6px;line-height:1.2}
.hero-title span{color:#fff;font-size:2rem}
.hero-sub{font-size:0.78rem;font-weight:300;opacity:0.85;margin-bottom:16px}
.hero-timer{display:flex;align-items:center;gap:6px;margin-bottom:16px}
.hero-timer .t-block{
  background:rgba(0,0,0,0.35);border-radius:8px;padding:6px 10px;
  font-size:1.2rem;font-weight:700;min-width:42px;text-align:center;
  backdrop-filter:blur(4px);
}
.hero-timer .t-sep{font-weight:700;font-size:1rem;opacity:0.6}
.hero-cta{
  display:inline-flex;align-items:center;gap:6px;
  background:#FF6B9D;color:#fff;
  border-radius:24px;padding:12px 24px;
  font-size:0.85rem;font-weight:700;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
  transition:transform 0.15s;
}
.hero-cta:active{transform:scale(0.97)}

/* ========== SECTION HEADER ========== */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 16px 10px;
}
.section-header h2{font-size:1rem;font-weight:700;color:var(--garlic-black)}
.section-header .more{font-size:0.75rem;font-weight:500;color:var(--garlic-gray-light);display:flex;align-items:center;gap:2px}
.section-header .more svg{width:14px;height:14px;stroke:var(--garlic-gray-light)}

/* ========== TIME DEALS (horizontal scroll) ========== */
.time-deals{
  display:flex;gap:10px;padding:0 16px 16px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.time-deals::-webkit-scrollbar{display:none}
.time-card{
  flex-shrink:0;width:150px;background:var(--garlic-white);
  border-radius:14px;overflow:hidden;position:relative;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.time-card:active{transform:scale(0.98)}
.time-thumb{
  width:100%;aspect-ratio:1/1;position:relative;
}
.time-badge{
  position:absolute;top:8px;left:8px;
  background:var(--garlic-coral);color:#fff;
  padding:3px 8px;border-radius:10px;
  font-size:0.62rem;font-weight:700;
  display:flex;align-items:center;gap:3px;
}
.time-info{padding:10px}
.time-name{font-size:0.72rem;font-weight:500;color:var(--garlic-black);line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.time-price{display:flex;align-items:baseline;gap:4px}
.time-discount{font-size:0.85rem;font-weight:700;color:var(--garlic-coral)}
.time-amount{font-size:0.85rem;font-weight:700;color:var(--garlic-black)}
.time-original{font-size:0.65rem;font-weight:300;color:var(--garlic-gray-light);text-decoration:line-through;margin-top:2px}

/* ========== PRODUCT GRID ========== */
.product-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:0 16px 16px;
}
.product-card{
  background:var(--garlic-white);border-radius:12px;
  overflow:hidden;transition:transform 0.15s;
}
.product-card:active{transform:scale(0.98)}
.product-thumb{
  width:100%;aspect-ratio:1/1;position:relative;overflow:hidden;
}
.product-thumb .tag{
  position:absolute;top:8px;left:8px;
  padding:3px 8px;border-radius:4px;
  font-size:0.62rem;font-weight:700;line-height:1.4;
}
.tag-deal{background:var(--garlic-coral);color:#fff}
.tag-hot{background:var(--garlic-red);color:#fff}
.tag-best{background:var(--garlic-green);color:#fff}
.tag-limit{background:var(--garlic-purple);color:#fff}
.product-thumb .wish{
  position:absolute;bottom:8px;right:8px;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.85);border-radius:50%;
  backdrop-filter:blur(4px);
}
.product-thumb .wish svg{width:16px;height:16px;stroke:var(--garlic-gray-light);fill:none;stroke-width:1.8}
.wish.active svg{fill:#FF6B9D !important;stroke:#FF6B9D !important}
.product-info{padding:10px 10px 14px}
.product-brand{font-size:0.65rem;font-weight:500;color:var(--garlic-gray-light);margin-bottom:3px}
.product-name{font-size:0.78rem;font-weight:500;color:var(--garlic-black);line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-price{display:flex;align-items:baseline;gap:4px}
.product-discount{font-size:0.9rem;font-weight:700;color:var(--garlic-coral)}
.product-amount{font-size:0.9rem;font-weight:700;color:var(--garlic-black)}
.product-original{font-size:0.7rem;font-weight:300;color:var(--garlic-gray-light);text-decoration:line-through;margin-top:2px}
.product-meta{display:flex;align-items:center;gap:6px;margin-top:6px}
.product-meta .stars{font-size:0.65rem;color:var(--garlic-gold)}
.product-meta .review{font-size:0.62rem;font-weight:300;color:var(--garlic-gray-light)}

/* ========== CATEGORY DEALS ========== */
.cat-tabs{
  display:flex;gap:8px;padding:0 16px 12px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  flex-shrink:0;padding:8px 18px;border-radius:20px;
  font-size:0.78rem;font-weight:500;
  background:var(--garlic-white);color:var(--garlic-gray);
  border:1px solid var(--garlic-gray-border);
  transition:all 0.2s;cursor:pointer;
}
.cat-tab.active{
  background:var(--garlic-black);color:var(--garlic-white);
  border-color:var(--garlic-black);
}
.cat-deal-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:0 16px 16px;
}

/* ========== RANKING LIST ========== */
.ranking-list{padding:0 16px 16px}
.rank-item{
  display:flex;align-items:center;gap:12px;
  padding:14px;background:var(--garlic-white);
  border-radius:12px;margin-bottom:8px;
  transition:transform 0.15s;
}
.rank-item:active{transform:scale(0.99)}
.rank-num{
  font-size:1.1rem;font-weight:700;color:var(--garlic-green);
  min-width:28px;text-align:center;
}
.rank-num.top3{color:var(--garlic-coral)}
.rank-thumb{
  width:64px;height:64px;border-radius:10px;
  flex-shrink:0;overflow:hidden;
}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:0.78rem;font-weight:500;color:var(--garlic-black);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-price{display:flex;align-items:baseline;gap:4px}
.rank-discount{font-size:0.82rem;font-weight:700;color:var(--garlic-coral)}
.rank-amount{font-size:0.82rem;font-weight:700;color:var(--garlic-black)}
.rank-original{font-size:0.65rem;font-weight:300;color:var(--garlic-gray-light);text-decoration:line-through}

/* ========== ANIMATIONS ========== */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.5s ease-out both}
.fade-up-1{animation-delay:0.05s}
.fade-up-2{animation-delay:0.1s}
.fade-up-3{animation-delay:0.15s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}


/* ===== GARLIC NAV SYSTEM ===== */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;height:52px;padding-top:env(safe-area-inset-top,0px);background:rgba(255,250,220,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.header-inner{max-width:430px;margin:0 auto;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.header-wordmark{font-family:'Bagel Fat One','Noto Sans KR',sans-serif;font-size:24px;color:#98CD00;line-height:1;letter-spacing:1px}
.header-actions{display:flex;align-items:center;gap:12px}
.header-actions a{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;position:relative;transition:background .2s;text-decoration:none}
.header-actions a:active{background:rgba(182,245,0,.1)}
.header-actions a svg{width:22px;height:22px;color:#A0AD78}
.cart-badge{position:absolute;top:3px;right:1px;min-width:16px;height:16px;border-radius:8px;background:#FF6B9D;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;border:1.5px solid #FAFAFA}
.tab-nav{position:fixed;top:52px;left:0;right:0;z-index:999;height:44px;background:rgba(255,253,238,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-inner{max-width:430px;margin:0 auto;height:100%;display:flex;align-items:stretch}
.tab-item{flex-shrink:0;padding:0 14px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#A0AD78;white-space:nowrap;position:relative;transition:color .2s;text-decoration:none}
.tab-item:first-child{padding-left:16px}
.tab-item.active{color:#98CD00;font-weight:700}
.tab-item.active::after{content:'';position:absolute;bottom:0;left:14px;right:14px;height:2.5px;background:#A4DD00;border-radius:2px 2px 0 0}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:1000;height:calc(56px + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:#FFFDEE;border-top:.5px solid #F0E8A0}
.bottom-nav-inner{max-width:430px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-around}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;min-width:52px;transition:transform .15s;text-decoration:none}
.nav-item:active{transform:scale(.92)}
.nav-item svg{width:22px;height:22px;color:#A0AD78;transition:color .2s}
.nav-item .nav-label{font-size:9px;font-weight:500;color:#A0AD78;transition:color .2s}
.nav-item.active svg{color:#98CD00}
.nav-item.active .nav-label{color:#98CD00;font-weight:700}
.nav-item .cart-wrap{position:relative}
.nav-item .nav-badge{position:absolute;top:-5px;right:-9px;background:#FF6B9D;color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:1.5px solid #FFFDEE}

</style>

// ===== HERO COUNTDOWN =====
(function(){
  let total = 1*3600 + 23*60 + 45;
  function tick(){
    if(total<=0) return;
    total--;
    const h=Math.floor(total/3600), m=Math.floor((total%3600)/60), s=total%60;
    document.getElementById('hero-h').textContent=String(h).padStart(2,'0');
    document.getElementById('hero-m').textContent=String(m).padStart(2,'0');
    document.getElementById('hero-s').textContent=String(s).padStart(2,'0');
  }
  setInterval(tick,1000);
})();

// ===== FADE-UP OBSERVER =====
const obs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if(e.isIntersecting){e.target.classList.add('fade-up');obs.unobserve(e.target)}
  });
}, {threshold:0.1});
document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));

// ===== WISH BUTTON =====
document.querySelectorAll('.wish').forEach(function(btn) {
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    this.classList.toggle('active');
    if (this.classList.contains('active')) {
      this.querySelector('svg').style.fill = '#FF6B9D';
      this.querySelector('svg').style.stroke = '#FF6B9D';
    } else {
      this.querySelector('svg').style.fill = 'none';
      this.querySelector('svg').style.stroke = '#A0AD78';
    }
  });
});

/* Tab-nav PC drag scroll */
(function(){var el=document.querySelector(".tab-nav");if(!el)return;var isDown=false,startX,scrollLeft;el.style.cursor="grab";el.addEventListener("mousedown",function(e){isDown=true;el.style.cursor="grabbing";startX=e.pageX-el.offsetLeft;scrollLeft=el.scrollLeft});el.addEventListener("mouseleave",function(){isDown=false;el.style.cursor="grab"});el.addEventListener("mouseup",function(){isDown=false;el.style.cursor="grab"});el.addEventListener("mousemove",function(e){if(!isDown)return;e.preventDefault();var x=e.pageX-el.offsetLeft;el.scrollLeft=scrollLeft-(x-startX)})})();
</script>
